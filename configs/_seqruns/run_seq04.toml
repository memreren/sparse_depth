# Unified sparse-depth config (viewer + evaluator + ablations).
#
# Viewer:
#   python -m sparse_depth.interactive_feature_manager_kitti --config configs/default.toml
#
# Evaluator:
#   python sparse_depth_eval_kitti.py --config configs/default.toml
#
# Keep sequence/data paths together here. The viewer and evaluator both read this
# file; viewer-only values live under [viewer], evaluator-only values live under
# [evaluator].

[paths]
# Shared output root default. Evaluator/viewer may override via CLI if desired.
output_root = "outputs/sift_lk_seq10_refined_multiview_dlt"
# Raw KITTI camera id. image_00 / odometry P0 corresponds to "00".
camera = "00"

# [sequence00]
# ############## SEQUENCE 00 ########################
# # Directory containing rectified grayscale images.
# img_dir = "data/sequences/00/image_0"
# # KITTI odometry calibration file. P0 provides the monocular camera intrinsics.
# calib = "data/sequences/00/calib.txt"
# # KITTI odometry poses. These are used for GT-pose triangulation/diagnostics.
# poses = "data/data_odometry_poses/dataset/poses/00.txt"
# # Number of digits in image filenames: odometry image_0 uses 6, raw image_00 uses 10.
# image_digits = 6
# # Directory containing KITTI velodyne .bin files; set null to disable LiDAR metrics.
# velodyne_dir = "data/2011_10_03_drive_0027_sync/velodyne_points/data"
# # Raw KITTI velo-to-camera calibration file.
# calib_velo_to_cam = "data/2011_10_03/calib_velo_to_cam.txt"
# # Raw KITTI cam-to-cam calibration file for rectification/projection.
# calib_cam_to_cam = "data/2011_10_03/calib_cam_to_cam.txt"
# # Number of digits in Velodyne filenames. Leave commented to use image_digits.
# lidar_digits = 10

# [sequence04]
# ############## SEQUENCE 04 ########################
# # Directory containing rectified grayscale image_00 PNG files.
# img_dir = "data/data_odometry_gray/dataset/sequences/04/image_0"
# # KITTI odometry calibration file; P0 is used for the monocular camera intrinsics.
# calib = "data/data_odometry_gray/dataset/sequences/04/calib.txt"
# # KITTI odometry pose file; used only for GT geometry/triangulation diagnostics.
# poses = "data/data_odometry_poses/dataset/poses/04.txt"
# # Number of digits in image filenames, e.g. 0000000000.png -> 10.
# image_digits = 6
# # Directory containing KITTI Velodyne .bin files. Leave commented to disable LiDAR.
# velodyne_dir = "data/2011_09_30_drive_0016_sync/velodyne_points/data"
# # Raw KITTI velo-to-camera calibration file. Needed for raw Velodyne projection.
# calib_velo_to_cam = "data/2011_09_30_calib/2011_09_30/calib_velo_to_cam.txt"
# # Raw KITTI cam-to-cam calibration file. Preferred when projecting raw Velodyne.
# calib_cam_to_cam = "data/2011_09_30_calib/2011_09_30/calib_cam_to_cam.txt"
# # Number of digits in Velodyne filenames. Leave commented to use image_digits.
# lidar_digits = 10

[sequence10]
############## SEQUENCE 10 ########################
# Directory containing rectified grayscale image_00 PNG files.
img_dir = "data/data_odometry_gray/dataset/sequences/10/image_0"
# KITTI odometry calibration file; P0 is used for the monocular camera intrinsics.
calib = "data/data_odometry_gray/dataset/sequences/10/calib.txt"
# KITTI odometry pose file; used only for GT geometry/triangulation diagnostics.
poses = "data/data_odometry_poses/dataset/poses/10.txt"
# Number of digits in image filenames, e.g. 0000000000.png -> 10.
image_digits = 6
# Directory containing KITTI Velodyne .bin files. Leave commented to disable LiDAR.
velodyne_dir = "data/2011_09_30_drive_0034_sync/velodyne_points/data"
# Raw KITTI velo-to-camera calibration file. Needed for raw Velodyne projection.
calib_velo_to_cam = "data/2011_09_30_calib/2011_09_30/calib_velo_to_cam.txt"
# Raw KITTI cam-to-cam calibration file. Preferred when projecting raw Velodyne.
calib_cam_to_cam = "data/2011_09_30_calib/2011_09_30/calib_cam_to_cam.txt"
# Number of digits in Velodyne filenames. Leave commented to use image_digits.
lidar_digits = 10


[run]
# First frame loaded/processed.
start = 0
# Last frame allowed; omit or override from CLI to allow the whole pose file.
end_frame = 250

[frontend]
# sift_lk: current SIFT detection + descriptor system.
# shi_sift_lk: Shi--Tomasi locations, SIFT descriptors retained for existing
# association/reacquisition; soft-SIFT rescue is disabled in this mode.
# xfeat_sift_lk: learned XFeat keypoint locations (CPU-only), SIFT descriptors
# retained for association; soft-SIFT rescue is disabled in this mode. First run
# downloads the XFeat model via torch.hub.
# xfeat_native: XFeat keypoint locations AND XFeat's own learned descriptors used
# for matching (end-to-end learned features); soft-SIFT rescue disabled.
# Feature axes (orthogonal): detector = shi|sift|xfeat, descriptor = sift|xfeat.
detector = "sift"
descriptor = "sift"
shi_max_corners = 6000
shi_quality_level = 0.005
shi_min_distance = 7.0
shi_block_size = 7
# XFeat detector knobs (only used when detector_mode = "xfeat_sift_lk").
# Max keypoints per frame requested from XFeat.
xfeat_top_k = 4096
# XFeat keypoint-score NMS threshold; lower keeps more/weaker keypoints.
xfeat_detection_threshold = 0.05
# SIFT descriptor patch size, in pixels, computed at each XFeat keypoint.
xfeat_desc_size = 7.0
# xfeat_native only: scale for XFeat's unit-norm descriptors so the SIFT-tuned
# max_desc_dist gates apply. ~250 maps a good match (~0.8 L2) into SIFT range.
xfeat_native_desc_scale = 250.0

[sift]
# Maximum number of primary SIFT features requested per frame.
sift_nfeatures = 6000
# Number of SIFT octave layers; OpenCV default is 3.
sift_n_octave_layers = 3
# Primary SIFT contrast threshold; lower detects weaker features.
contrast = 0.01
# Primary SIFT edge threshold; larger keeps more edge-like features.
edge = 10.0
# Primary SIFT Gaussian sigma.
sigma = 1.6

[lk]
# Enables LK-first tracking before descriptor association.
lk_on = true
# If true, LK tracks must also find a nearby acceptable SIFT descriptor refresh.
lk_require_desc_refresh = false
# LK window side length in pixels.
lk_win_size = 21
# Number of LK pyramid levels.
lk_max_level = 3
# Maximum LK iterations per pyramid level.
lk_max_iter = 30
# LK convergence epsilon.
lk_eps = 0.01
# Forward-backward consistency threshold in pixels.
lk_fb_thresh = 1.0
# Maximum accepted LK displacement in one frame.
lk_max_step_px = 80.0
# Maximum OpenCV LK error accepted.
lk_max_error = 35.0
# Minimum eigenvalue threshold; higher rejects weak/aperture-prone points.
lk_min_eig_thresh = 1e-4
# Radius for finding a SIFT descriptor refresh around an accepted LK point.
lk_desc_refresh_radius = 5.0
# Maximum descriptor distance accepted for LK descriptor refresh.
lk_desc_refresh_max_dist = 220.0
# Run primary SIFT every N frames for descriptor refresh/rescue; 1 means every frame.
detection_period = 3
# Run soft SIFT every N frames when primary SIFT is running.
soft_sift_period = 6
# Spawn new tracks every N frames when primary SIFT is running.
spawn_period = 3
# Force primary SIFT if LK-carried active tracks fall below this count; 0 disables.
force_detection_active_below = 400
# Force primary SIFT if current bucket coverage after LK falls below this fraction; 0 disables.
force_detection_coverage_below = 0.5
# Only run soft SIFT when at least this many buckets are underfilled; 0 disables.
force_soft_underfilled_buckets = 100
# Reject LK points with GT Sampson epipolar error above this threshold; 0 disables.
lk_epipolar_thresh = 1.0
# If true, reject LK flow vectors that disagree with nearby accepted flow vectors.
lk_flow_consistency = true
# Radius in pixels for local flow-neighborhood lookup.
lk_flow_radius = 45.0
# Minimum neighbors required before local flow consistency is tested.
lk_flow_min_neighbors = 5
# Robust MAD multiplier for local flow outlier rejection.
lk_flow_mad_k = 3.5
# Minimum absolute flow-difference threshold in pixels.
lk_flow_abs_thresh = 8.0

[soft_sift]
# Enables the softened SIFT detector for rescue and bucket filling.
soft_spawn = true
# If true, soft detections first try to rescue tracks missed by primary/LK matching.
soft_rescue = true
# Maximum number of softened SIFT features requested per frame.
soft_nfeatures = 8000
# Soft SIFT contrast threshold; lower than primary to admit weaker features.
soft_contrast = 0.004
# Soft SIFT edge threshold; larger admits more edge-like features.
soft_edge = 15.0
# Soft SIFT Gaussian sigma.
soft_sigma = 1.6
# Hits required before a soft-born track becomes confirmed.
soft_confirm_hits = 3
# Search radius, in pixels, for soft-rescue matching.
soft_rescue_search_radius = 55.0
# Lowe ratio threshold for soft rescue; lower is stricter.
soft_rescue_ratio = 0.70
# Maximum SIFT L2 descriptor distance accepted for soft rescue.
soft_rescue_max_desc_dist = 240.0
# Soft detector mask radius around primary detections that already won a match; 0 disables.
soft_detect_mask_used_primary = 5.0
# Soft-rescue duplicate rejection radius around already-used primary detections.
soft_dup_used_primary = 5.0
# Soft-spawn duplicate rejection radius around any primary detection.
soft_spawn_primary_sep = 7.0
# Quality-score penalty for tracks whose last source was soft/soft_rescue.
soft_source_penalty = 0.0

[association]
# Descriptor reference for matching: latest adapts; anchor resists drift.
descriptor_mode = "latest"
# Image-space prediction model used to center the matching search gate.
prediction = "constant_velocity"
# Normal descriptor association search radius in pixels after LK failures.
search_radius = 30.0
# Normal Lowe ratio threshold; lower is stricter.
ratio = 0.75
# Normal maximum SIFT L2 descriptor distance.
max_desc_dist = 280.0
# Search radius for tracks that already missed one or more frames.
reacq_search_radius = 65.0
# Lowe ratio threshold for reacquisition.
reacq_ratio = 0.70
# Maximum descriptor distance for reacquisition.
reacq_max_desc_dist = 240.0
# If true, a candidate can pass when only one detection lies in the search gate.
allow_single_candidate = true
# Assignment cost spatial term weight: cost += spatial_weight*(spatial/radius)*max_desc_dist.
spatial_weight = 0.20
# Assignment cost penalty per missed frame.
miss_cost = 30.0
# Extra hard cap on per-frame descriptor-match displacement, in pixels.
max_step_px = 80.0

[track_management]
# Hits required before a primary-born track is confirmed.
min_hits_confirm = 3
# Number of consecutive misses tolerated before killing a track.
max_misses = 2
# Global cap on active tracks after spawning.
max_active_tracks = 1500
# Enables near-duplicate active-track suppression.
duplicate_suppression = true
# Pixel radius used by duplicate suppression.
duplicate_dist = 4.0

[quality]
# Quality bonus added to confirmed tracks.
quality_confirmed_bonus = 40.0
# Per-hit quality gain before capping.
quality_hit_weight = 1.5
# Maximum total hit-count contribution.
quality_hit_cap = 25.0
# Quality penalty per current miss.
quality_miss_penalty = 18.0
# Quality penalty per reacquisition event.
quality_reacq_penalty = 8.0
# Quality penalty while a reacquired track is on probation.
quality_probation_penalty = 8.0
# Quality bonus if the last source was LK.
quality_lk_bonus = 3.0
# Descriptor-refresh age, in frames, before LK staleness penalty starts.
quality_lk_stale_after = 5
# Quality penalty per stale descriptor frame after quality_lk_stale_after.
quality_lk_stale_penalty = 0.8
# Maximum total LK staleness penalty.
quality_lk_stale_cap = 10.0
# Quality penalty per SIFT descriptor-distance unit.
quality_desc_penalty = 0.03
# Quality penalty per pixel of spatial prediction error.
quality_spatial_penalty = 0.25
# Quality bonus if the track is active in the current frame.
quality_active_bonus = 10.0

[buckets]
# Number of spatial bucket columns across the image.
grid_cols = 20
# Number of spatial bucket rows across the image.
grid_rows = 8
# Population target: spawn until each bucket roughly reaches this many active tracks.
target_per_bucket = 8
# Diagnostic overfull threshold; does not directly kill tracks.
max_per_bucket = 16
# Minimum pixel distance from active tracks when spawning a new track.
min_spawn_distance = 7.0
# If true, candidate/unconfirmed tracks count toward bucket population.
spawn_count_candidates = true
# Maximum quality-ranked sparse-depth/display candidates selected per bucket.
output_per_bucket = 8
# Global cap for selected sparse-depth/display candidates before viewer draw cap.
output_max_tracks = 1500

[triangulation]
# Backend: best_pair_dlt, flow_depth_pair, refined_pair_dlt,
# corrected_pair_dlt, windowed_multiview_dlt, refined_multiview_dlt,
# or hybrid_pair_multiview.
triangulation_method = "windowed_multiview_dlt"
# Minimum current+past observations required by windowed_multiview_dlt.
multiview_min_views = 3
# Pair-fallback minimum parallax in degrees; used by hybrid_pair_multiview.
hybrid_pair_min_parallax_deg = 0.50
# Pair-fallback minimum camera-center baseline in meters.
hybrid_pair_min_baseline = 0.5
# Pair-fallback recent-frame search limit.
hybrid_pair_max_history = 4
# Pair-fallback maximum reprojection error in pixels.
hybrid_pair_reproj_thresh = 1.5
# Minimum current+past observations required for nonlinear fixed-pose point refinement.
refine_min_views = 3
# Maximum damped Gauss-Newton iterations for one 3D point. Used by
# refined_pair_dlt and refined_multiview_dlt.
refine_max_iters = 6
# Huber robust-loss transition in pixels; set 0 to disable robust weighting.
# Used by refined_pair_dlt and refined_multiview_dlt.
refine_huber_px = 2.0
# Maximum refined reprojection RMSE in pixels. Used by refined_pair_dlt and
# refined_multiview_dlt.
refine_rmse_thresh = 2.0
# Reject refined result if depth shifts this fraction away from DLT
# initialization. Used by refined_pair_dlt and refined_multiview_dlt.
refine_max_depth_shift_ratio = 0.5
# Maximum reprojection error at the current-frame pixel for multiview results.
# Important: sparse depth is drawn/evaluated on this exact current pixel.
current_reproj_thresh = 2.0
# Maximum reprojection error allowed for any single retained multiview
# observation. This prevents a low RMSE from hiding one very bad view.
max_reproj_thresh = 3.0
# GT Sampson epipolar-error threshold in pixels.
gt_epi_thresh = 1.0
# Minimum ray parallax angle accepted for triangulation.
min_parallax_deg = 0.40
# Minimum camera-center baseline in meters.
min_baseline = 0.5
# Maximum number of recent frames searched for triangulation pairs/views.
max_pair_history = 10
# If true, only confirmed tracks are triangulated.
triang_confirmed_only = false
# Minimum track hits before triangulation is attempted.
triang_min_hits = 2
# If true, reacquired/probation tracks may still be triangulated.
triang_include_reacquired = true
# Minimum accepted current-frame depth in meters.
min_depth = 1.0
# Maximum accepted current-frame depth in meters.
max_depth = 120.0
# Maximum reprojection RMSE in pixels.
reproj_thresh = 2.0

[lidar]
# Pixel search radius for matching sparse depth points to projected LiDAR.
# The interactive LiDAR click picker uses at least this radius too.
lidar_radius_px = 5.0
# LiDAR depth choice inside the pixel radius: nearest, min_depth, or median_depth.
lidar_match_mode = "nearest"
# Minimum projected LiDAR depth accepted for GT comparison/viewer.
min_lidar_depth = 1.0
# Maximum projected LiDAR depth accepted and top of viewer color scale.
max_lidar_depth = 120.0
# Maximum projected LiDAR points drawn in the interactive LiDAR window.
max_lidar_vis_points = 12000
# Extra click-selection radius for projected LiDAR points. The viewer uses
# max(lidar_radius_px, lidar_click_radius), so this can stay smaller.
lidar_click_radius = 2.5

[pose_eval]
# Frame gap for fixed-gap Essential/RANSAC pose diagnostics.
pose_eval_gap = 1
# Minimum matched point pairs required before pose evaluation runs.
pose_min_pairs = 30
# RANSAC inlier threshold in pixels.
pose_ransac_thresh = 0.5
# RANSAC success probability.
pose_ransac_prob = 0.999
# Maximum RANSAC iterations.
pose_ransac_max_iters = 3000


[viewer]
# If true, write per-frame manager CSV log.
log_csv = false
# Maximum tracks drawn in the interactive viewer; does not change depth export selection.
draw_max_tracks = 2200
# Radius of drawn feature points in pixels.
point_radius = 2
# Width of the right dashboard panel in pixels.
side_panel_width = 400
# Minimum dashboard/canvas height in pixels; image is padded, not stretched.
side_panel_height = 600
# Initial OpenCV window scale factor.
resize = 1.2
# Mouse coordinate mapping for OpenCV callbacks.
# raw: callback already reports canvas/image pixels. This is common on Windows.
# window: scale callback coordinates by cv2.getWindowImageRect.
# resize: divide callback coordinates by the configured resize factor.
# auto: raw unless raw is outside the displayed canvas.
mouse_coordinate_mode = "raw"
# Number of recent observations drawn as a path per track.
path_len = 15
# Click-selection radius in image pixels.
inspect_radius = 12.0

[evaluator]
# Number of frames to process from start.
num_frames = 50
# If true, evaluate all active triangulated depths instead of bucket-selected depths.
all_active_depths = false
# If true, write per-point sparse depth rows in addition to frame summaries.
save_per_point = false
# Plot backend: matplotlib, opencv, or auto.
plot_backend = "matplotlib"
# If true, save image-space relative/absolute error maps.
save_visualizations = false
# Save one visualization every N processed frames.
save_vis_every = 10
# Relative-error color scale maximum; 1.0 means 100 percent.
error_vmax_rel = 1.0
# Absolute-error color scale maximum in meters.
error_vmax_abs = 10.0
# Maximum sparse/LiDAR points drawn per saved visualization.
max_vis_points = 6000
# If true, also draw projected LiDAR samples on visualization images.
show_lidar_vis_points = false

