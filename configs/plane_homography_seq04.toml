[lidar]
min_lidar_depth = 1.0
max_lidar_depth = 120.0
max_lidar_vis_points = 12000
lidar_click_radius = 5.0

[run]
start = 20
end_frame = 250

[plane_homography]
camera_height_m = 1.65
min_depth_m = 2.0
max_depth_m = 45.0
ground_scale_ransac_thresh_px = 1.0
ground_scale_max_hypotheses = 3000
cache_size = 80
evaluation_cache_size = 4
homography_gap = 1
homography_confirmed_only = true
homography_include_reacquired = false
homography_ransac_thresh_px = 2.0
homography_ransac_confidence = 0.999
homography_ransac_max_iters = 3000
# Broad left/right debug support, but top deliberately lower in the image.

# homography_roi_top_y_frac = 0.66
# homography_roi_bottom_left_frac = 0.4
# homography_roi_bottom_right_frac = 0.6#0.7
# homography_roi_top_left_frac = 0.4
# homography_roi_top_right_frac = 0.6#0.5

homography_roi_top_y_frac = 0.66
homography_roi_bottom_left_frac = 0.02
homography_roi_bottom_right_frac = 0.98#0.7
homography_roi_top_left_frac = 0.02
homography_roi_top_right_frac = 0.75#0.5
residual_mad_scale = 3.5
# Calibrated constant camera-vs-road offset plane (viewer 'g' method). Produced by:
#   python ground_plane_calibrate_kitti.py --config configs/default.toml \
#     --config configs/plane_homography_seq04.toml --start 20 --num-frames 150 \
#     --output configs/ground_calib_seq04.json
calibration_path = "configs/ground_calib_seq04.json"

[gating]
gate_zncc_threshold = 0.4         # correlation needed for "green" agreement
gate_patch_radius_px = 2          # ZNCC window half-size (4 -> 9x9)
gate_min_patch_std = 0.2         # texture floor to evaluate a pixel at all
gate_sparse_reproj_thresh_px = 2.0
gate_min_sparse_inliers = 12      # frame-health gate (see warning below)

homography_roi_top_y_frac = 0.66
homography_roi_bottom_left_frac = 0.02
homography_roi_bottom_right_frac = 0.98#0.7
homography_roi_top_left_frac = 0.02
homography_roi_top_right_frac = 0.75#0.5
[viewer]
side_panel_width = 600
side_panel_height = 820
