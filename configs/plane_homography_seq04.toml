# KITTI odometry calibration file; P0 is used for the monocular camera intrinsics.
calib = "C:/Users/DELL/Documents/kittiVO/data/data_odometry_gray/dataset/sequences/04/calib.txt"
# KITTI odometry pose file; used only for GT geometry/triangulation diagnostics.
poses = "C:/Users/DELL/Documents/kittiVO/data/data_odometry_poses/dataset/poses/04.txt"
# Number of digits in image filenames, e.g. 0000000000.png -> 10.
image_digits = 6
# Directory containing KITTI Velodyne .bin files. Leave commented to disable LiDAR.
velodyne_dir = "C:/Users/DELL/Documents/kittiVO/data/2011_09_30_drive_0016_sync/velodyne_points/data"
# Raw KITTI velo-to-camera calibration file. Needed for raw Velodyne projection.
calib_velo_to_cam = "C:/Users/DELL/Documents/kittiVO/data/2011_09_30_calib/2011_09_30/calib_velo_to_cam.txt"
# Raw KITTI cam-to-cam calibration file. Preferred when projecting raw Velodyne.
calib_cam_to_cam = "C:/Users/DELL/Documents/kittiVO/data/2011_09_30_calib/2011_09_30/calib_cam_to_cam.txt"
# Number of digits in Velodyne filenames. Leave commented to use image_digits.
